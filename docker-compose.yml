  kafka:
    image: apache/kafka:4.1.1
    container_name: chronos-kafka
    networks: [chronos]
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_LISTENERS: "INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"

  kowl:
    image: quay.io/cloudhut/kowl:v1.5.0
    container_name: chronos-kowl
    depends_on:
      - kafka
    ports:
      - "9091:8080"
    environment:
      KAFKA_BROKERS: "kafka:9092"
    networks: [chronos]

  jaeger-all-in-one:
    image: jaegertracing/all-in-one:1.57
    container_name: chronos-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "4319:4317"
    networks: [chronos]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: chronos-otelcol
    depends_on:
      - jaeger-all-in-one
    command: ["--config=/etc/otelcol-config.yml"]
    volumes:
      - ./infra/otelcol-config.yml:/etc/otelcol-config.yml:ro
    ports:
      - "1888:1888"
      - "13133:13133"
      - "4317:4317"
      - "4318:4318"
      - "55679:55679"
    networks: [chronos]

