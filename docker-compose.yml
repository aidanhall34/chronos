version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Core infrastructure
# ─────────────────────────────────────────────────────────────────────────────
services:

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: chronos_db
    volumes:
      - postgres:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chronos_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chronos

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9094:9094"   # External port for host-machine access
    environment:
      # KRaft (no ZooKeeper required)
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      # Listeners
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - chronos

# ─────────────────────────────────────────────────────────────────────────────
# Database migrations (one-shot init container)
# ─────────────────────────────────────────────────────────────────────────────
  chronos-pg-migrations:
    build:
      context: .
      dockerfile: Dockerfile.chronos-pg-migrations
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: admin
      PG_PASSWORD: admin
      PG_DATABASE: chronos_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - chronos

# ─────────────────────────────────────────────────────────────────────────────
# Chronos application
# ─────────────────────────────────────────────────────────────────────────────
  chronos:
    build:
      context: .
      dockerfile: Dockerfile.chronos
    ports:
      - "9091:9091"   # Prometheus /metrics endpoint
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: "9092"
      KAFKA_CLIENT_ID: chronos
      KAFKA_GROUP_ID: chronos
      KAFKA_IN_TOPIC: chronos.in
      KAFKA_OUT_TOPIC: chronos.out
      KAFKA_USERNAME: ""
      KAFKA_PASSWORD: ""
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: admin
      PG_PASSWORD: admin
      PG_DATABASE: chronos_db
      PG_POOL_SIZE: "10"
      RUST_LOG: info
      OTEL_EXPORTER_PROMETHEUS_HOST: "0.0.0.0"
      OTEL_EXPORTER_PROMETHEUS_PORT: "9091"
      MONITOR_DB_POLL: "5"
      PROCESSOR_DB_POLL: "5"
      TIMING_ADVANCE: "0"
      FAIL_DETECT_INTERVAL: "10"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      chronos-pg-migrations:
        condition: service_completed_successfully
    networks:
      - chronos

# ─────────────────────────────────────────────────────────────────────────────
# Telemetry (optional – used for distributed tracing)
# ─────────────────────────────────────────────────────────────────────────────
  jaeger-all-in-one:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
    container_name: Jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - chronos

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otelcol
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config.yml"]
    volumes:
      - ./infra/otelcol-config.yml:/etc/otelcol-config.yml
    ports:
      - "1888:1888"    # pprof extension
      - "13133:13133"  # health_check extension
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    depends_on:
      - jaeger-all-in-one
    networks:
      - chronos

networks:
  chronos:
    name: chronos

volumes:
  postgres:
    driver: local
