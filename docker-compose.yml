services:
  postgres:
    image: postgres:17.3
    container_name: chronos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: chronos_db
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chronos_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [chronos]
  

