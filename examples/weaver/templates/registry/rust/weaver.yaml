templates:
  - pattern: registry.rs.j2
    filter: >
      {
        metrics: (.groups
          | map(select(.type == "metric"))
          | map({
              id,
              metric_name,
              rust_name: .annotations.code_generation.rust_name,
              prometheus_name: .annotations.code_generation.prometheus_name,
              brief,
              instrument,
              unit,
              attributes: (.annotations.code_generation.label_names // (.attributes // [] | map(.name // .id // .ref))),
              prometheus_labels: (.annotations.code_generation.prometheus_label_names // (.attributes // [] | map((.name // .id // .ref) | gsub("\\."; "_")))),
              buckets: .annotations.code_generation.buckets,
              prewarm_label_values: (.annotations.code_generation.prewarm_label_values // [])
            }))
      }
    application_mode: single
    file_name: chronos_metric_definitions.rs
