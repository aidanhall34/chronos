groups:
  - id: resource.chronos.service
    type: attribute_group
    stability: development
    brief: Resource attributes emitted by the Chronos metrics mock.
    attributes:
      - id: service.name
        type: string
        stability: stable
        brief: Logical name of the service.
        examples: ["chronos-metrics-mock"]
        requirement_level: required
      - id: service.instance.id
        type: string
        stability: stable
        brief: The string ID of the service instance.
        examples: ["chronos-metrics-mock-live-check"]
        requirement_level: required

  - id: metric_attributes.chronos.consume_result
    type: attribute_group
    stability: development
    brief: Attributes for Chronos input message handling outcomes.
    attributes:
      - id: destination
        type: string
        stability: development
        brief: Downstream selected by message_receiver::handle_message.
        examples: ["kafka", "postgres"]
        requirement_level: required
      - id: chronos.consume.status
        type: string
        stability: development
        brief: Whether the consume path completed successfully.
        examples: ["pass", "fail"]
        requirement_level: required

  - id: metric_attributes.chronos.process_result
    type: attribute_group
    stability: development
    brief: Attributes for Chronos ready-message processor loop outcomes.
    attributes:
      - id: returned
        type: string
        stability: development
        brief: Whether the processor loop returned early because no rows were ready.
        examples: ["true", "false"]
        requirement_level: required
      - id: chronos.process.status
        type: string
        stability: development
        brief: Whether the processor loop completed successfully.
        examples: ["pass", "fail"]
        requirement_level: required

  - id: metric.chronos.message.consume.duration
    type: metric
    metric_name: chronos.message.consume.duration
    stability: development
    brief: Duration of handle_message() in message_receiver.
    instrument: histogram
    unit: s
    extends: metric_attributes.chronos.consume_result
    annotations:
      code_generation:
        rust_name: msg_consume_latency
        metric_value_type: double
        prometheus_name: msg_consume_latency
        label_names: [destination, status]
        prometheus_label_names: [destination, status]
        buckets: [0.001, 0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128, 0.256, 0.512, 1.024, 2.048]
        prewarm_label_values:
          - [kafka, pass]
          - [kafka, fail]
          - [postgres, pass]
          - [postgres, fail]

  - id: metric.chronos.message.process.duration
    type: metric
    metric_name: chronos.message.process.duration
    stability: development
    brief: Duration of processor_message_ready() loop in message_processor.
    instrument: histogram
    unit: s
    extends: metric_attributes.chronos.process_result
    annotations:
      code_generation:
        rust_name: msg_process_latency
        metric_value_type: double
        prometheus_name: msg_process_latency
        label_names: [returned, status]
        prometheus_label_names: [returned, status]
        buckets: [0.001, 0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128, 0.256, 0.512, 1.024, 2.048]
        prewarm_label_values:
          - ["true", pass]
          - ["true", fail]
          - ["false", pass]
          - ["false", fail]

  - id: metric.chronos.message.wait.duration
    type: metric
    metric_name: chronos.message.wait.duration
    stability: development
    brief: Time a message spent in the Kafka input queue before processing.
    instrument: histogram
    unit: s
    annotations:
      code_generation:
        rust_name: msg_wait_time
        metric_value_type: double
        prometheus_name: msg_wait_time
        buckets: [0.1, 0.2, 0.4, 0.8, 1.6, 3.2, 6.4, 12.8, 25.6, 51.2, 102.4, 204.8, 409.6, 819.2]

  - id: metric.chronos.message.jitter
    type: metric
    metric_name: chronos.message.jitter
    stability: development
    brief: Difference between actual publish time and client-requested deadline.
    instrument: histogram
    unit: s
    annotations:
      code_generation:
        rust_name: msg_jitter
        metric_value_type: double
        prometheus_name: msg_jitter
        buckets: [0.01, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]

  - id: metric.chronos.message.reset
    type: metric
    metric_name: chronos.message.reset
    stability: development
    brief: Number of records reset by reset_to_init_db() in the monitor task.
    instrument: counter
    unit: "{message}"
    annotations:
      code_generation:
        rust_name: msg_reset
        metric_value_type: int
        prometheus_name: msg_reset
