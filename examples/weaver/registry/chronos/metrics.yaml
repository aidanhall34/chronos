groups:
  - id: resource.chronos.service
    type: attribute_group
    stability: development
    brief: Resource attributes emitted by the Chronos metrics mock.
    attributes:
      - id: service.name
        type: string
        stability: stable
        brief: Logical name of the service.
        examples: ["chronos-metrics-mock"]
        requirement_level: required
      - id: service.instance.id
        type: string
        stability: stable
        brief: The string ID of the service instance.
        examples: ["chronos-metrics-mock-live-check"]
        requirement_level: required

  - id: metric_attributes.chronos.message_store
    type: attribute_group
    stability: development
    brief: Common attributes used by Chronos message store metrics.
    attributes:
      - id: messaging.system
        type: string
        stability: development
        brief: The messaging system as identified by the client instrumentation.
        examples: ["kafka"]
        requirement_level: required
      - id: messaging.operation.name
        type: string
        stability: development
        brief: The system-specific name of the messaging operation.
        examples: ["receive", "process"]
        requirement_level: required
      - id: messaging.destination.name
        type: string
        stability: development
        brief: The message destination name.
        examples: ["chronos-input", "chronos-output"]
        requirement_level: required

  - id: metric.chronos.message.consumed
    type: metric
    metric_name: messaging.client.consumed.messages
    stability: development
    brief: Total number of Chronos input messages consumed.
    instrument: counter
    unit: "{message}"
    extends: metric_attributes.chronos.message_store
    annotations:
      code_generation:
        rust_name: msg_consumed
        metric_value_type: int
        prometheus_name: messaging_client_consumed_messages_total

  - id: metric.chronos.message.consume.duration
    type: metric
    metric_name: messaging.client.operation.duration
    stability: development
    brief: Duration of handle_message() in message_receiver.
    instrument: histogram
    unit: s
    extends: metric_attributes.chronos.message_store
    annotations:
      code_generation:
        rust_name: msg_consume_latency
        metric_value_type: double
        prometheus_name: messaging_client_operation_duration_seconds
        buckets: [0.001, 0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128, 0.256, 0.512, 1.024, 2.048]

  - id: metric.chronos.message.process.duration
    type: metric
    metric_name: messaging.process.duration
    stability: development
    brief: Duration of processor_message_ready() loop in message_processor.
    instrument: histogram
    unit: s
    extends: metric_attributes.chronos.message_store
    annotations:
      code_generation:
        rust_name: msg_process_latency
        metric_value_type: double
        prometheus_name: messaging_process_duration_seconds
        buckets: [0.001, 0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128, 0.256, 0.512, 1.024, 2.048]

  - id: metric.chronos.message.wait.duration
    type: metric
    metric_name: chronos.message.wait.duration
    stability: development
    brief: Time a message spent in the Kafka input queue before processing.
    instrument: histogram
    unit: s
    annotations:
      code_generation:
        rust_name: msg_wait_time
        metric_value_type: double
        prometheus_name: chronos_message_wait_duration_seconds
        buckets: [0.1, 0.2, 0.4, 0.8, 1.6, 3.2, 6.4, 12.8, 25.6, 51.2, 102.4, 204.8, 409.6, 819.2]

  - id: metric.chronos.message.jitter
    type: metric
    metric_name: chronos.message.jitter
    stability: development
    brief: Difference between actual publish time and client-requested deadline.
    instrument: histogram
    unit: s
    annotations:
      code_generation:
        rust_name: msg_jitter
        metric_value_type: double
        prometheus_name: chronos_message_jitter_seconds
        buckets: [0.01, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]

  - id: metric.chronos.message.reset
    type: metric
    metric_name: chronos.message.reset
    stability: development
    brief: Number of records reset by reset_to_init_db() in the monitor task.
    instrument: counter
    unit: "{message}"
    annotations:
      code_generation:
        rust_name: msg_reset
        metric_value_type: int
        prometheus_name: chronos_messages_reset_total
