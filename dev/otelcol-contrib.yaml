receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: "opentelemetry-collector"
          scrape_interval: 1s
          static_configs:
            - targets: ["127.0.0.1:8888"]
  file_log/lgtm:
    include:
      - /data/lgtm/logs/*.jsonl
    include_file_name: true
    include_file_path: true
    start_at: beginning

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/ready"

processors:
  transform/lgtm_logs:
    log_statements:
      - context: log
        statements:
          - set(resource.attributes["service.name"], ExtractPatterns(attributes["log.file.name"], "^(?P<service_name>.*)\\.jsonl$")["service_name"]) where resource.attributes["service.name"] == nil
  batch:

exporters:
  otlp_http/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true
  otlp_http/traces:
    endpoint: http://127.0.0.1:4418
    tls:
      insecure: true
  otlp_http/logs:
    endpoint: http://127.0.0.1:3100/otlp
    tls:
      insecure: true
  otlp/profiles:
    endpoint: http://127.0.0.1:4040
    tls:
      insecure: true
  debug/metrics:
    verbosity: detailed
  debug/traces:
    verbosity: detailed
  debug/logs:
    verbosity: detailed

service:
  telemetry:
    logs:
      encoding: json
    metrics:
      level: detailed
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/traces]
    metrics:
      receivers: [otlp, prometheus/collector]
      processors: [batch]
      exporters: [otlp_http/metrics]
    logs:
      receivers: [otlp, file_log/lgtm]
      processors: [transform/lgtm_logs, batch]
      exporters: [otlp_http/logs]
    profiles:
      receivers: [otlp]
      exporters: [otlp/profiles]
