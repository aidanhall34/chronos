templates:
  - pattern: metrics.md.j2
    filter: >
      {
        metrics: (.groups
          | map(select(.type == "metric"))
          | map({
              metric_name,
              prometheus_name: (.metric_name | split(".") | join("_")),
              brief,
              instrument,
              unit,
              attributes: (.attributes // [] | map(.name // .id // .ref))
            }))
      }
    application_mode: single
    file_name: chronos_metrics.md
