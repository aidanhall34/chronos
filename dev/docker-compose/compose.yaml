include:
  - infra.yaml

services:
  chronos-pg-migrations:
    build:
      context: ../..
      dockerfile: Dockerfile.chronos-pg-migrations
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: admin
      PG_PASSWORD: admin
      PG_DATABASE: chronos_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - chronos

  chronos:
    build:
      context: ../..
      dockerfile: Dockerfile.chronos
    ports:
      - "9091:9091"
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: "9092"
      KAFKA_CLIENT_ID: chronos
      KAFKA_GROUP_ID: chronos
      KAFKA_IN_TOPIC: chronos.in
      KAFKA_OUT_TOPIC: chronos.out
      KAFKA_USERNAME: ""
      KAFKA_PASSWORD: ""
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: admin
      PG_PASSWORD: admin
      PG_DATABASE: chronos_db
      PG_POOL_SIZE: "10"
      RUST_LOG: info
      OTEL_EXPORTER_PROMETHEUS_HOST: "0.0.0.0"
      OTEL_EXPORTER_PROMETHEUS_PORT: "9091"
      MONITOR_DB_POLL: "5"
      PROCESSOR_DB_POLL: "5"
      TIMING_ADVANCE: "0"
      FAIL_DETECT_INTERVAL: "10"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      chronos-pg-migrations:
        condition: service_completed_successfully
    networks:
      - chronos
