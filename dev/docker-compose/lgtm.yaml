services:
  chronos:
    command:
      - sh
      - -c
      - /opt/build/chronos >> /data/lgtm/logs/chronos.jsonl 2>&1
    environment:
      OTEL_METRICS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_METRICS_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://lgtm:4317
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://lgtm:4318/v1/traces
    depends_on:
      lgtm:
        condition: service_healthy
    volumes:
      - ../lgtm/runtime-logs:/data/lgtm/logs

  lgtm:
    image: grafana/otel-lgtm:0.24.1
    container_name: lgtm
    environment:
      ENABLE_LOGS_ALL: "true"
      GF_LOG_CONSOLE_FORMAT: json
      GF_LOG_FORMAT: json
      GF_LOG_MODE: console
      LGTM_LOG_DIR: /data/lgtm/logs
      LOKI_EXTRA_ARGS: -log.format=json
      PROMETHEUS_EXTRA_ARGS: --log.format=json
      PYROSCOPE_EXTRA_ARGS: -log.format=json
    ports:
      - "3000:3000"
      - "3100:3100"
      - "3200:3200"
      - "4040:4040"
      - "4317:4317"
      - "4318:4318"
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "sh /otel-lgtm/chronos-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ../lgtm/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ../lgtm/otelcol-contrib.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ../lgtm/healthcheck.sh:/otel-lgtm/chronos-healthcheck.sh:ro
      - ../lgtm/logging.sh:/otel-lgtm/logging.sh:ro
      - ../lgtm/runtime-logs:/data/lgtm/logs
      - ../lgtm/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/chronos.yaml:ro
      - ../dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards/chronos:ro
    networks:
      - chronos
