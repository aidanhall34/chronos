---
global:
  scrape_interval: 15s
  scrape_native_histograms: true

otlp:
  keep_identifying_resource_attributes: true
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment
    - deployment.environment.name
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name
    - host.name
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name
    - database
    - kafka.cluster.alias

storage:
  tsdb:
    out_of_order_time_window: 10m

scrape_configs:
  - job_name: chronos
    static_configs:
      - targets: ["chronos:9091"]

  - job_name: grafana
    static_configs:
      - targets: ["127.0.0.1:3000"]

  - job_name: loki
    static_configs:
      - targets: ["127.0.0.1:3100"]

  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: pyroscope
    static_configs:
      - targets: ["127.0.0.1:4040"]

  - job_name: tempo
    static_configs:
      - targets: ["127.0.0.1:3200"]

  - job_name: opentelemetry-collector
    scrape_interval: 1s
    static_configs:
      - targets: ["127.0.0.1:8888"]
