logger:
  level: info

kafka:
  brokers:
    - kafka:9092
  clientId: chronos-kminion

minion:
  consumerGroups:
    enabled: true
    scrapeMode: adminApi
    granularity: topic
  topics:
    enabled: true
    granularity: topic
  logDirs:
    enabled: true
  endToEnd:
    enabled: false

exporter:
  namespace: kminion
  host: ""
  port: 8080
